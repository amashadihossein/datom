url: https://amashadihossein.github.io/datom/

template:
  bootstrap: 5
  light-switch: true

home:
  links:
  - text: GitHub
    href: https://github.com/amashadihossein/datom

logo:
  image: man/figures/logo.svg

navbar:
  structure:
    left: [intro, reference, articles]
    right: [search, lightswitch, github]
  components:
    github:
      icon: fa-github
      href: https://github.com/amashadihossein/datom

reference:
  - title: "Connection & Setup"
    desc: "Create connections, initialize repositories"
    contents:
      - datom_init_repo
      - datom_init_gov
      - datom_clone
      - datom_get_conn
      - new_datom_conn
      - is_datom_conn
      - print.datom_conn

  - title: "Store Objects"
    desc: "Create and inspect storage configuration objects"
    contents:
      - datom_store
      - datom_store_s3
      - datom_store_local
      - is_datom_store
      - is_datom_store_s3
      - is_datom_store_local
      - print.datom_store
      - print.datom_store_s3
      - print.datom_store_local

  - title: "Read & Write"
    desc: "Read and write versioned tables"
    contents:
      - datom_read
      - datom_write

  - title: "Query & Status"
    desc: "List tables, view history, check status"
    contents:
      - datom_list
      - datom_summary
      - print.datom_summary
      - datom_projects
      - datom_history
      - datom_status
      - datom_get_parents

  - title: "Sync Operations"
    desc: "Batch sync from files, scan manifests, sync metadata to S3"
    contents:
      - datom_pull
      - datom_pull_gov
      - datom_sync
      - datom_sync_manifest
      - datom_sync_dispatch

  - title: "Validation"
    desc: "Validate repository structure and git-S3 consistency"
    contents:
      - datom_validate
      - is_valid_datom_repo

  - title: "Decommission"
    desc: "Permanently remove a project and all its artefacts"
    contents:
      - datom_decommission

  - title: "Example Data"
    desc: "Bundled clinical trial data for examples and vignettes"
    contents:
      - datom_example_data
      - datom_example_cutoffs

articles:
  - title: "Get Started"
    desc: "A user journey through STUDY-001 -- start here."
    navbar: ~
    contents:
      - first-extract
      - month-2-arrives
      - folder-of-extracts
      - promoting-to-s3
      - handing-off
      - second-engineer
      - governing-a-portfolio
      - auditing-reproducibility
      - looking-ahead

  - title: "Design"
    desc: "Why datom is shaped the way it is."
    contents:
      - design-datom-model
      - design-version-shas
      - design-ref-json
      - design-dispatch
      - design-two-repos
      - design-serverless
