url: https://amashadihossein.github.io/datom/

template:
  bootstrap: 5

navbar:
  structure:
    left: [intro, reference, articles]
    right: [search, github]
  components:
    github:
      icon: fa-github
      href: https://github.com/amashadihossein/datom

reference:
  - title: "Connection & Setup"
    desc: "Create connections, initialize repositories"
    contents:
      - datom_init_repo
      - datom_clone
      - datom_get_conn
      - new_datom_conn
      - is_datom_conn
      - print.datom_conn

  - title: "Read & Write"
    desc: "Read and write versioned tables"
    contents:
      - datom_read
      - datom_write

  - title: "Query & Status"
    desc: "List tables, view history, check status"
    contents:
      - datom_list
      - datom_history
      - datom_status
      - datom_get_parents

  - title: "Sync Operations"
    desc: "Batch sync from files, scan manifests, sync metadata to S3"
    contents:
      - datom_pull
      - datom_sync
      - datom_sync_manifest
      - datom_sync_routing

  - title: "Validation"
    desc: "Validate repository structure and git-S3 consistency"
    contents:
      - datom_validate
      - datom_repository_check
      - is_valid_datom_repo

  - title: "Example Data"
    desc: "Bundled clinical trial data for examples and vignettes"
    contents:
      - datom_example_data
      - datom_example_cutoffs
