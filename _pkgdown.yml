url: https://amashadihossein.github.io/datom/

template:
  bootstrap: 5
  light-switch: true

home:
  links:
  - text: GitHub
    href: https://github.com/amashadihossein/datom

logo:
  image: man/figures/logo.svg

navbar:
  structure:
    left: [intro, reference, articles]
    right: [search, lightswitch, github]
  components:
    github:
      icon: fa-github
      href: https://github.com/amashadihossein/datom

reference:
  - title: "Connection & Setup"
    desc: "Create connections, initialize repositories"
    contents:
      - datom_init_repo
      - datom_clone
      - datom_get_conn
      - new_datom_conn
      - is_datom_conn
      - print.datom_conn

  - title: "Store Objects"
    desc: "Create and inspect storage configuration objects"
    contents:
      - datom_store
      - datom_store_s3
      - datom_store_s3_creds
      - datom_store_local
      - is_datom_store
      - is_datom_store_s3
      - is_datom_store_s3_creds
      - is_datom_store_local
      - print.datom_store
      - print.datom_store_s3
      - print.datom_store_s3_creds
      - print.datom_store_local

  - title: "Read & Write"
    desc: "Read and write versioned tables"
    contents:
      - datom_read
      - datom_write

  - title: "Query & Status"
    desc: "List tables, view history, check status"
    contents:
      - datom_list
      - datom_summary
      - print.datom_summary
      - datom_projects
      - datom_history
      - datom_status
      - datom_get_parents
      - datom_get_lineage
      - datom_validate_lineage

  - title: "Sync Operations"
    desc: "Batch sync from files, scan manifests, sync metadata to S3"
    contents:
      - datom_pull
      - datom_sync
      - datom_sync_manifest

  - title: "Validation"
    desc: "Validate repository structure and git-S3 consistency"
    contents:
      - datom_validate
      - is_valid_datom_repo

  - title: "Storage Extension API"
    desc: >
      Low-level storage and data-repo primitives for package developers (e.g.
      datomanager). End users should use datom_read / datom_write /
      datom_repo_delete instead.
    contents:
      - datom_storage_list
      - datom_storage_delete_prefix
      - datom_storage_copy
      - datom_storage_verify
      - datom_repo_set_data_store
      - datom_repo_attach_governance

  - title: "Teardown"
    desc: "Permanently remove a project's data repo and local clone"
    contents:
      - datom_repo_delete

  - title: "Example Data"
    desc: "Bundled clinical trial data for examples and vignettes"
    contents:
      - datom_example_data
      - datom_example_cutoffs

articles:
  - title: "Get Started"
    desc: "Your first datom project: simulate, version, read."
    navbar: ~
    contents:
      - first-extract
      - month-2-arrives
      - folder-of-extracts

  - title: "Start on S3"
    desc: "Begin directly in object storage."
    contents:
      - start-on-s3

  - title: "Lineage & Roadmap"
    desc: "Trace data lineage; where datom sits in the daapr stack."
    contents:
      - source-lineage
      - looking-ahead

  - title: "Design"
    desc: "Why datom is shaped the way it is."
    contents:
      - design-datom-model
      - design-version-shas
      - design-serverless
