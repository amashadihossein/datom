<svg xmlns="http://www.w3.org/2000/svg" version="1.1" xmlns:xlink="http://www.w3.org/1999/xlink" width="181.93" height="210"><metadata><rdf:RDF xmlns:rdf="http://www.w3.org/1999/02/22-rdf-syntax-ns#" xmlns:dc="http://purl.org/dc/elements/1.1/"><rdf:Description><dc:creator>RealFaviconGenerator</dc:creator><dc:source>https://realfavicongenerator.net</dc:source></rdf:Description></rdf:RDF></metadata><svg viewBox="0 0 181.93 210">
  <style>
    .hex-fill { fill: #FFFFFF; }
    .hex-border { stroke: #000000; }
    .orbital { stroke: #888888; }
    .electron { fill: #000000; }
    .electron-text { fill: #FFFFFF; }
    .table-bg { fill: #FFFFFF; }
    .table-border { stroke: #555555; }
    .table-header { fill: #000000; }
    .table-line { stroke: #555555; }
    .label { fill: #000000; }
    .label-dim { fill: #000000; opacity: 0.6; }

    @media (prefers-color-scheme: dark) {
      .hex-fill { fill: #0D1B2A; }
      .hex-border { stroke: #AAAAAA; }
      .orbital { stroke: #777777; }
      .electron { fill: #FFFFFF; }
      .electron-text { fill: #0D1B2A; }
      .table-bg { fill: #0D1B2A; }
      .table-border { stroke: #AAAAAA; }
      .table-header { fill: #FFFFFF; }
      .table-line { stroke: #AAAAAA; }
      .label { fill: #FFFFFF; }
      .label-dim { fill: #FFFFFF; opacity: 0.6; }
    }
  </style>

  <!-- Hex background -->
  <polygon class="hex-fill" points="90.965,0 181.93,52.5 181.93,157.5 90.965,210 0,157.5 0,52.5"></polygon>
  <!-- Hex border -->
  <polygon points="90.965,3 178.93,54.5 178.93,155.5 90.965,207 3,155.5 3,54.5" fill="none" class="hex-border" stroke-width="2.5"></polygon>

  <!-- Atom orbits -->
  <g transform="translate(91, 88)">
    <ellipse cx="0" cy="0" rx="56" ry="22" fill="none" class="orbital" stroke-width="0.8"></ellipse>
    <ellipse cx="0" cy="0" rx="56" ry="22" fill="none" class="orbital" stroke-width="0.8" transform="rotate(60)"></ellipse>
    <ellipse cx="0" cy="0" rx="56" ry="22" fill="none" class="orbital" stroke-width="0.8" transform="rotate(-60)"></ellipse>

    <!-- Electron 1: right tip -->
    <circle cx="56" cy="0" r="5.5" class="electron"></circle>
    <text x="56" y="0" text-anchor="middle" dominant-baseline="central" font-family="'Consolas',monospace" font-size="7" font-weight="700" class="electron-text">1</text>

    <!-- Electron 2: upper-left tip -->
    <circle cx="-28" cy="-48.5" r="5.5" class="electron"></circle>
    <text x="-28" y="-48.5" text-anchor="middle" dominant-baseline="central" font-family="'Consolas',monospace" font-size="7" font-weight="700" class="electron-text">0</text>

    <!-- Electron 3: lower-left tip -->
    <circle cx="-28" cy="48.5" r="5.5" class="electron"></circle>
    <text x="-28" y="48.5" text-anchor="middle" dominant-baseline="central" font-family="'Consolas',monospace" font-size="7" font-weight="700" class="electron-text">1</text>

    <!-- Nucleus: Data table -->
    <g transform="translate(-14, -12)">
      <rect x="0" y="0" width="28" height="24" rx="2" class="table-bg" stroke-width="1.5"></rect>
      <rect x="0" y="0" width="28" height="24" rx="2" fill="none" class="table-border" stroke-width="1.5"></rect>
      <rect x="0" y="0" width="28" height="7" rx="2" class="table-header" opacity="0.15"></rect>
      <rect x="0" y="5" width="28" height="2" class="table-header" opacity="0.15"></rect>
      <line x1="9.3" y1="0" x2="9.3" y2="24" class="table-line" stroke-width="0.6" opacity="0.5"></line>
      <line x1="18.6" y1="0" x2="18.6" y2="24" class="table-line" stroke-width="0.6" opacity="0.5"></line>
      <line x1="0" y1="7" x2="28" y2="7" class="table-line" stroke-width="0.6" opacity="0.5"></line>
      <line x1="0" y1="12.7" x2="28" y2="12.7" class="table-line" stroke-width="0.4" opacity="0.3"></line>
      <line x1="0" y1="18.3" x2="28" y2="18.3" class="table-line" stroke-width="0.4" opacity="0.3"></line>
    </g>
  </g>

  <!-- "datom" text -->
  <text x="91" y="172" text-anchor="middle" font-family="'Consolas',monospace" font-size="28" font-weight="600" letter-spacing="2">
    <tspan class="label-dim">d</tspan><tspan class="label">atom</tspan>
  </text>
</svg></svg>